<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        /* ============================================================
           MD3 + Liquid Glass 融合设计系统
        ============================================================ */
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4;
            --bg-grad-2: #ffe9ef;
            --bg-grad-3: #f3e9ff;
            --bg-grad-4: #e9f3ff;

            --md-primary: #fb7299;
            --md-primary-hover: #e55a80;
            --md-on-primary: #ffffff;
            --md-secondary: #86a8e7;
            --md-tertiary: #feb47b;

            --text-primary: #2a1f24;
            --text-secondary: #6b5a60;

            --glass-fill: rgba(255, 255, 255, 0.45);
            --glass-fill-strong: rgba(255, 255, 255, 0.6);
            --glass-stroke: rgba(255, 255, 255, 0.7);
            --glass-stroke-soft: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(180, 120, 140, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-tint: rgba(251, 114, 153, 0.06);
            --blur: 18px;

            --shape-xs: 10px;
            --shape-sm: 16px;
            --shape-md: 22px;
            --shape-lg: 28px;
            --shape-xl: 36px;
            --shape-full: 999px;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.2, 0.9, 0.3, 1.2);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f;
            --bg-grad-2: #181430;
            --bg-grad-3: #0f1b3a;
            --bg-grad-4: #1a1430;

            --md-primary: #fb7299;
            --md-primary-hover: #ff8fad;
            --md-on-primary: #2a0e18;
            --md-secondary: #9db8ff;
            --md-tertiary: #ffc99b;

            --text-primary: #f2eef0;
            --text-secondary: #b7adc4;

            --glass-fill: rgba(40, 44, 70, 0.4);
            --glass-fill-strong: rgba(50, 54, 84, 0.55);
            --glass-stroke: rgba(160, 175, 230, 0.4);
            --glass-stroke-soft: rgba(160, 175, 230, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.45);
            --glass-highlight: rgba(200, 215, 255, 0.5);
            --glass-tint: rgba(120, 140, 220, 0.08);
            --blur: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', 'Noto Sans SC', 'Segoe UI', Tahoma, sans-serif; }

        body {
            min-height: 100vh;
            position: relative;
            background: var(--bg-grad-1);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: color 0.4s var(--ease-standard);
        }
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: auroraFlow 22s ease-in-out infinite;
            filter: saturate(1.1);
            transition: background 0.6s ease;
        }
        @keyframes auroraFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        body.sidebar-open { overflow: hidden; }

        /* ================= 顶部栏 ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            position: sticky;
            top: 14px;
            z-index: 100;
        }
        .menu-btn, .search-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--shape-full);
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
            z-index: 101;
        }
        .menu-btn:hover, .search-btn:hover {
            background: var(--md-primary);
            color: var(--md-on-primary);
            transform: scale(1.08);
            border-radius: var(--shape-md);
        }
        .menu-btn:active, .search-btn:active { transform: scale(0.92); }
        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary), var(--md-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title-icon { -webkit-text-fill-color: initial; }

        /* ================= 侧边栏 ================= */
        .sidebar {
            position: fixed;
            top: 14px;
            left: -380px;
            width: 340px;
            max-height: calc(100vh - 28px);
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            z-index: 1000;
            transition: left 0.55s var(--spring-soft);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .sidebar.open { left: 14px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px 18px; border-bottom: 1px solid var(--glass-stroke-soft); }
        .close-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: var(--shape-full);
            transition: transform 0.5s var(--spring), background 0.3s ease;
        }
        .close-btn:hover { color: var(--md-on-primary); background: var(--md-primary); transform: rotate(90deg); }
        .sidebar-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-secondary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-menu { padding: 22px 0; }
        .menu-item {
            padding: 15px 18px;
            margin: 12px 0;
            border-radius: var(--shape-md);
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--glass-fill);
            border: 1px solid var(--glass-stroke-soft);
            transition: transform 0.5s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover {
            background: var(--glass-tint);
            transform: translateX(8px);
            border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm);
            border-color: var(--md-primary);
        }
        .menu-item:active { transform: translateX(8px) scale(0.97); }
        .menu-item i { margin-right: 14px; font-size: 1.35rem; width: 30px; text-align: center; }
        .bilibili-icon { color: var(--md-primary); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-standard);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* ================= 主内容 ================= */
        main { flex: 1; padding: 20px 20px 30px; display: flex; flex-direction: column; align-items: center; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            align-self: flex-start;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 11px 22px;
            border-radius: var(--shape-full);
            text-decoration: none;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            margin-bottom: 28px;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .back-btn:hover { background: var(--glass-tint); transform: translateX(-6px); border-radius: var(--shape-md); border-color: var(--md-primary); }
        .back-btn i { margin-right: 8px; }

        .settings-container {
            max-width: 620px;
            width: 100%;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border-radius: var(--shape-xl);
            padding: 40px;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 12px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            text-align: center;
            animation: cardReveal 0.6s var(--spring-soft) both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
        .settings-title {
            font-size: 2.3rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(110deg, var(--md-tertiary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .setting-item { margin: 26px 0; text-align: left; }
        .setting-label { display: block; font-size: 1.05rem; font-weight: 600; color: var(--md-secondary); margin-bottom: 12px; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            margin-bottom: 14px;
            transition: border-radius 0.4s var(--spring), border-color 0.3s ease;
        }
        .setting-row:hover { border-color: var(--md-primary); border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm); }
        .setting-name { font-size: 1rem; font-weight: 600; }
        .setting-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px; }

        /* MD3 风格开关 */
        .toggle-switch { position: relative; width: 52px; height: 30px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(130, 130, 160, 0.35);
            border: 2px solid var(--glass-stroke-soft);
            transition: 0.4s var(--spring);
            border-radius: var(--shape-full);
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: var(--text-secondary);
            transition: 0.4s var(--spring);
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--md-primary); border-color: transparent; }
        input:checked + .toggle-slider:before { transform: translateX(22px); width: 22px; height: 22px; bottom: 2px; background-color: var(--md-on-primary); }

        .theme-options { display: flex; gap: 14px; flex-wrap: wrap; }
        .theme-option {
            flex: 1;
            min-width: 120px;
            padding: 18px 12px;
            background: var(--glass-tint);
            border: 2px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            cursor: pointer;
            transition: transform 0.45s var(--spring), border-color 0.3s ease, background 0.3s ease, border-radius 0.4s var(--spring);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .theme-option:hover { border-color: var(--md-secondary); transform: translateY(-3px); }
        .theme-option.active { border-color: var(--md-primary); background: var(--glass-fill-strong); border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm); }
        .theme-option i { font-size: 1.9rem; margin-bottom: 8px; display: block; }
        .theme-option span { font-size: 0.9rem; font-weight: 600; }

        .language-select {
            width: 100%;
            padding: 15px;
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            color: var(--text-primary);
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        .language-select:focus { outline: none; border-color: var(--md-secondary); }
        .language-select option { background: var(--bg-grad-1); color: var(--text-primary); }

        .save-btn {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            padding: 13px 32px;
            border-radius: var(--shape-full);
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .save-btn:hover { background: var(--md-primary-hover); transform: translateY(-3px); border-radius: var(--shape-md); }
        .save-btn:active { transform: translateY(-1px) scale(0.97); }
        .save-btn i { margin-right: 8px; }

        .language-info {
            margin-top: 30px;
            padding: 20px;
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 15px 30px;
            border-radius: var(--shape-full);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 12px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            font-size: 1rem;
            z-index: 2000;
            transition: transform 0.5s var(--spring-soft);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-secondary);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .copyright { font-size: 1rem; font-weight: 500; color: var(--text-secondary); }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s var(--ease-standard);
            pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 768px) {
            .settings-title { font-size: 2rem; }
            .settings-container { padding: 30px; }
            .theme-options { flex-direction: column; }
            .sidebar { width: calc(100vw - 28px); }
        }
        @media (max-width: 480px) {
            header { padding: 12px 16px; margin: 10px; }
            .title { font-size: 1.4rem; }
            .settings-title { font-size: 1.8rem; }
            .settings-container { padding: 22px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            body::before { animation: none; }
        }
    </style>
    <script src="protect.js"></script>
</head>
<body class="page-transition">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span data-i18n="menuBilibili">B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('post.html')"><i class="fas fa-newspaper"></i><span data-i18n="menuPost">帖子动态</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span data-i18n="menuSettings">设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span data-i18n="menuAbout">关于我们</span></div>
        </div>
        <div class="sidebar-footer" style="margin-top: auto; padding: 18px 0; text-align: center; color: var(--text-secondary);"><p data-i18n="moreSoon">更多功能开发中...</p></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="toast" id="toast" data-i18n="saved">设置已保存</div>

    <header>
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h1 class="title"><span class="title-icon">⚙️</span><span data-i18n="pageTitle">系统设置</span></h1>
        <button class="search-btn" id="searchToggle"><i class="fas fa-search"></i></button>
    </header>

    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="backHome">返回首页</span></a>
        <div class="settings-container">
            <h2 class="settings-title" data-i18n="settingsTitle">系统设置</h2>

            <div class="setting-item">
                <label class="setting-label" data-i18n="appearance">外观主题</label>
                <div class="theme-options">
                    <div class="theme-option" data-theme="light" onclick="setThemeOption('light')">
                        <i class="fas fa-sun" style="color: #ffa500;"></i>
                        <span data-i18n="light">浅色模式</span>
                    </div>
                    <div class="theme-option" data-theme="dark" onclick="setThemeOption('dark')">
                        <i class="fas fa-moon" style="color: #6666cc;"></i>
                        <span data-i18n="dark">深色模式</span>
                    </div>
                    <div class="theme-option" data-theme="auto" onclick="setThemeOption('auto')">
                        <i class="fas fa-clock" style="color: #fb7299;"></i>
                        <span data-i18n="auto">自动切换</span>
                    </div>
                </div>
            </div>

            <div class="setting-item">
                <label class="setting-label" data-i18n="language">语言设置</label>
                <select class="language-select" id="language" onchange="changeLanguage(this.value)">
                    <option value="zh">简体中文</option>
                    <option value="zh-tw">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>

            <div class="setting-item">
                <label class="setting-label" data-i18n="display">显示设置</label>
                <div class="setting-row">
                    <div>
                        <div class="setting-name" data-i18n="showCovers">显示视频封面</div>
                        <div class="setting-desc" data-i18n="showCoversDesc">在视频列表中显示封面图片</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="showCovers" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div>
                        <div class="setting-name" data-i18n="animations">动画效果</div>
                        <div class="setting-desc" data-i18n="animationsDesc">启用页面过渡动画</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="enableAnimations" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="setting-item">
                <label class="setting-label" data-i18n="dataMgmt">数据管理</label>
                <div class="setting-row" style="cursor: pointer;" onclick="clearCache()">
                    <div>
                        <div class="setting-name" data-i18n="clearCache">清除缓存</div>
                        <div class="setting-desc" data-i18n="clearCacheDesc">清除本地存储的设置和数据</div>
                    </div>
                    <i class="fas fa-trash" style="color: var(--md-primary);"></i>
                </div>
            </div>

            <button class="save-btn" onclick="saveSettings()"><i class="fas fa-save"></i> <span data-i18n="save">保存设置</span></button>

            <div class="language-info">
                <p data-i18n="info1">设置将保存在浏览器Cookies中</p>
                <p data-i18n="info2">清除浏览器数据会重置所有设置</p>
            </div>
        </div>
    </main>
    <footer>
        <div class="copyright" data-i18n="footer">© 2026 ぼりんの网站 | 设置页面</div>
    </footer>

    <script src="i18n.js"></script>
    <script>
        // 语言切换由共享 i18n.js 的 changeLanguage 处理（写入 cookie + 应用）
        // 下拉框 onchange 直接调用全局 changeLanguage(this.value)

        // ============================================================
        //  主题管理
        // ============================================================
        function getBeijingHour() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (3600000 * 8)).getHours(); }
        function applyTheme(theme) { document.documentElement.setAttribute('data-theme', theme); }
        function resolveTheme(setting) {
            if (setting === 'auto' || !setting) return getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark';
            return setting;
        }
        function initTheme() {
            const setting = getCookie('themeSetting') || 'auto';
            applyTheme(resolveTheme(setting));
            updateThemeOptions(setting);
        }
        function setThemeOption(theme) {
            updateThemeOptions(theme);
            applyTheme(resolveTheme(theme));
            const savedSeed = getCookie('seed');
            if (savedSeed) applySeed(savedSeed);
        }
        function updateThemeOptions(current) {
            document.querySelectorAll('.theme-option').forEach(opt => opt.classList.remove('active'));
            const el = document.querySelector('.theme-option[data-theme="' + (current || 'auto') + '"]');
            if (el) el.classList.add('active');
        }

        function setCookie(name, value, days) { document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/'; }
        function getCookie(name) { const c = document.cookie.split('; ').find(row => row.startsWith(name + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }

        // ============================================================
        //  MD3 动态配色（继承首页选择的种子色）
        // ============================================================
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }
        function hsl(h, s, l) { return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }
        function applySeed(seed) {
            const [h, s] = hexToHsl(seed);
            const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--seed', seed);
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h + 210) % 360, Math.min(s, 70), dark ? 78 : 68));
            root.setProperty('--md-tertiary', hsl((h + 60) % 360, Math.min(s, 80), dark ? 75 : 70));
            const aL = dark ? 16 : 95, bL = dark ? 14 : 93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s, 60), aL));
            root.setProperty('--bg-grad-2', hsl((h + 30) % 360, Math.min(s, 55), bL - 1));
            root.setProperty('--bg-grad-3', hsl((h + 200) % 360, Math.min(s, 55), aL - 2));
            root.setProperty('--bg-grad-4', hsl((h + 60) % 360, Math.min(s, 55), bL));
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark ? 60 : 55}%, ${dark ? 0.1 : 0.07})`);
        }

        // ============================================================
        //  初始化
        // ============================================================
        initTheme();
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);
        applyLanguage(getCookie('language') || 'zh');

        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebarBtn = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');
        const toast = document.getElementById('toast');

        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebarBtn.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 320); }

        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });

        // ============================================================
        //  涟漪反馈
        // ============================================================
        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect();
                const size = Math.max(r.width, r.height);
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }
        document.querySelectorAll('.menu-item, .menu-btn, .search-btn, .save-btn, .theme-option').forEach(addRipple);

        // ============================================================
        //  设置读取 / 保存
        // ============================================================
        function loadSettings() {
            updateThemeOptions(getCookie('themeSetting') || 'auto');
            const lang = getCookie('language');
            if (lang) document.getElementById('language').value = lang;
            const showCovers = getCookie('showCovers');
            if (showCovers !== null) document.getElementById('showCovers').checked = showCovers === 'true';
            const animations = getCookie('enableAnimations');
            if (animations !== null) document.getElementById('enableAnimations').checked = animations === 'true';
        }
        function saveSettings() {
            const themeSetting = document.querySelector('.theme-option.active')?.dataset.theme || 'auto';
            setCookie('themeSetting', themeSetting, 365);
            setCookie('language', document.getElementById('language').value, 365);
            setCookie('showCovers', document.getElementById('showCovers').checked, 365);
            setCookie('enableAnimations', document.getElementById('enableAnimations').checked, 365);
            showToast(t('savedMsg'));
        }
        function clearCache() {
            document.cookie.split(';').forEach(c => { document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/'); });
            showToast(t('cacheCleared'));
            setTimeout(() => location.reload(), 800);
        }
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        loadSettings();
        initI18n();
    </script>
</body>
</html>
