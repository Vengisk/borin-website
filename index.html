    <link rel="alternate" hreflang="zh-MO" href="https://vengisk.cc.cd/" />
    <link rel="alternate" hreflang="zh-TW" href="https://vengisk.cc.cd/" />
    <link rel="alternate" hreflang="en" href="https://vengisk.cc.cd/" />
    <link rel="alternate" hreflang="ja" href="https://vengisk.cc.cd/" />
    <link rel="alternate" hreflang="x-default" href="https://vengisk.cc.cd/" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        /* ============================================================
           MD3 + Liquid Glass 融合设计系统
           - MD3: 动态配色令牌、表现力组件、弹簧动效、圆润字体
           - Liquid Glass: 半透明折射材质、悬浮功能层、凝胶弹性
        ============================================================ */
        :root {
            /* MD3 动态配色种子（由 accent 派生，模拟壁纸取色） */
            --seed: #fb7299;

            /* ---- 浅色：MD3 Surface / Tonal 体系 ---- */
            --bg-grad-1: #fff0f4;
            --bg-grad-2: #ffe9ef;
            --bg-grad-3: #f3e9ff;
            --bg-grad-4: #e9f3ff;

            --md-primary: #fb7299;
            --md-on-primary: #ffffff;
            --md-secondary: #86a8e7;
            --md-tertiary: #feb47b;

            --text-primary: #2a1f24;
            --text-secondary: #6b5a60;

            /* Liquid Glass 材质令牌（浅色） */
            --glass-fill: rgba(255, 255, 255, 0.45);
            --glass-fill-strong: rgba(255, 255, 255, 0.6);
            --glass-stroke: rgba(255, 255, 255, 0.7);
            --glass-stroke-soft: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(180, 120, 140, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-tint: rgba(251, 114, 153, 0.06);
            --blur: 18px;

            /* MD3 形状刻度 */
            --shape-xs: 10px;
            --shape-sm: 16px;
            --shape-md: 22px;
            --shape-lg: 28px;
            --shape-xl: 36px;
            --shape-full: 999px;

            /* MD3 弹簧动效（表现力运动） */
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.2, 0.9, 0.3, 1.2);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="dark"] {
            --bg-grad-1: #14121f;
            --bg-grad-2: #181430;
            --bg-grad-3: #0f1b3a;
            --bg-grad-4: #1a1430;

            --md-primary: #fb7299;
            --md-on-primary: #2a0e18;
            --md-secondary: #9db8ff;
            --md-tertiary: #ffc99b;

            --text-primary: #f2eef0;
            --text-secondary: #b7adc4;

            --glass-fill: rgba(40, 44, 70, 0.4);
            --glass-fill-strong: rgba(50, 54, 84, 0.55);
            --glass-stroke: rgba(160, 175, 230, 0.4);
            --glass-stroke-soft: rgba(160, 175, 230, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.45);
            --glass-highlight: rgba(200, 215, 255, 0.5);
            --glass-tint: rgba(120, 140, 220, 0.08);
            --blur: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', 'Noto Sans SC', 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            position: relative;
            background: var(--bg-grad-1);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: color 0.4s var(--ease-standard);
        }

        /* 动态壁纸层：模拟 MD3 从壁纸取色的流动光晕 */
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: auroraFlow 22s ease-in-out infinite;
            filter: saturate(1.1);
            transition: background 0.6s ease;
        }
        @keyframes auroraFlow {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        body.sidebar-open { overflow: hidden; }

        /* ================= 液态玻璃通用工具 ================= */
        .glass {
            position: relative;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow:
                0 8px 32px var(--glass-shadow),
                inset 0 1px 0 var(--glass-highlight),
                inset 0 -1px 1px var(--glass-tint);
            overflow: hidden;
        }
        /* 玻璃顶部高光“透镜”边缘 */
        .glass::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--glass-stroke), transparent 40%, transparent 60%, var(--glass-stroke-soft));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* ================= 顶部栏（悬浮玻璃层） ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow:
                0 8px 32px var(--glass-shadow),
                inset 0 1px 0 var(--glass-highlight);
            position: sticky;
            top: 14px;
            z-index: 100;
        }

        .menu-btn, .search-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--shape-full);
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            backdrop-filter: blur(6px);
        }
        .menu-btn:hover, .search-btn:hover {
            background: var(--md-primary);
            color: var(--md-on-primary);
            transform: scale(1.08);
            /* MD3 表现力：圆形 -> 方正形态变化 */
            border-radius: var(--shape-md);
        }
        .menu-btn:active, .search-btn:active { transform: scale(0.92); }

        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary), var(--md-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================= 侧边栏（液态玻璃，弹簧滑入） ================= */
        .sidebar {
            position: fixed;
            top: 14px;
            left: -380px;
            width: 340px;
            max-height: calc(100vh - 28px);
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow:
                0 20px 60px var(--glass-shadow),
                inset 0 1px 0 var(--glass-highlight);
            z-index: 1000;
            transition: left 0.55s var(--spring-soft);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .sidebar.open { left: 14px; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 18px;
            border-bottom: 1px solid var(--glass-stroke-soft);
        }
        .close-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: var(--shape-full);
            transition: transform 0.5s var(--spring), background 0.3s ease;
        }
        .close-btn:hover {
            color: var(--md-on-primary);
            background: var(--md-primary);
            transform: rotate(90deg);
        }
        .sidebar-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-secondary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-menu { padding: 22px 0; }

        .menu-item {
            padding: 15px 18px;
            margin: 12px 0;
            border-radius: var(--shape-md);
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--glass-fill);
            border: 1px solid var(--glass-stroke-soft);
            transition: transform 0.5s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover {
            background: var(--glass-tint);
            transform: translateX(8px);
            border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm);
            border-color: var(--md-primary);
        }
        .menu-item:active { transform: translateX(8px) scale(0.97); }
        .menu-item i {
            margin-right: 14px;
            font-size: 1.35rem;
            width: 30px;
            text-align: center;
        }
        .bilibili-icon { color: var(--md-primary); }

        /* ================= 遮罩 ================= */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-standard);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* ================= 主内容 ================= */
        main {
            flex: 1;
            padding: 40px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .welcome-text {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(110deg, var(--md-tertiary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 0.9s var(--spring-soft);
        }
        .sub-text {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 42px;
            animation: fadeInUp 0.9s var(--spring-soft) 0.15s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(34px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .info-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 920px;
            width: 100%;
        }

        /* 液态玻璃信息卡 + MD3 弹簧 */
        .info-card {
            position: relative;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow:
                0 8px 32px var(--glass-shadow),
                inset 0 1px 0 var(--glass-highlight);
            border-radius: var(--shape-lg);
            padding: 32px 26px;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.7s var(--spring-soft) forwards;
            transition: transform 0.5s var(--spring), box-shadow 0.4s ease, border-color 0.3s ease, border-radius 0.5s var(--spring);
        }
        .info-card.d1 { animation-delay: 0.25s; }
        .info-card.d2 { animation-delay: 0.35s; }
        .info-card.d3 { animation-delay: 0.45s; }
        .info-card.d4 { animation-delay: 0.55s; }

        /* 动态高光：随鼠标移动的“透镜”反光 */
        .info-card::before {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            top: var(--my, 50%);
            left: var(--mx, 50%);
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .info-card:hover::before { opacity: 1; }
        .info-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--md-primary);
            border-radius: var(--shape-xl) var(--shape-sm) var(--shape-xl) var(--shape-sm);
            box-shadow: 0 22px 50px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        }
        .info-card:active { transform: translateY(-4px) scale(0.99); }

        .info-card i {
            font-size: 2.8rem;
            margin-bottom: 16px;
            display: block;
            position: relative;
            z-index: 1;
        }
        .info-card h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; position: relative; z-index: 1; }
        .info-card p { color: var(--text-secondary); line-height: 1.6; position: relative; z-index: 1; }
        .card-bilibili i { color: var(--md-primary); }
        .card-settings i { color: var(--md-secondary); }
        .card-about i { color: var(--md-tertiary); }
        .card-post i { color: #5bd6c9; }

        /* ================= 动态配色选择器（MD3 取色模拟） ================= */
        .accent-dock {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding: 10px 14px;
            border-radius: var(--shape-full);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
            animation: fadeInUp 0.7s var(--spring-soft) 0.65s both;
        }
        .accent-dot {
            width: 30px;
            height: 30px;
            border-radius: var(--shape-full);
            border: 2px solid var(--glass-stroke);
            cursor: pointer;
            transition: transform 0.45s var(--spring), border-radius 0.4s var(--spring);
        }
        .accent-dot:hover { transform: scale(1.18); border-radius: var(--shape-xs); }
        .accent-dot:active { transform: scale(0.9); }

        /* ================= 页脚 ================= */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .time-display {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--glass-tint);
            padding: 14px 28px;
            border-radius: var(--shape-md);
            border: 1px solid var(--glass-stroke-soft);
        }
        .time-label { color: var(--md-secondary); margin-right: 10px; }
        .time-value { color: var(--md-tertiary); font-variant-numeric: tabular-nums; }
        .time-icon { margin-right: 14px; font-size: 1.7rem; color: var(--md-primary); animation: pulse 2s var(--spring-soft) infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .copyright { margin-top: 18px; color: var(--text-secondary); font-weight: 500; }

        /* ================= 涟漪（凝胶弹性反馈） ================= */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s var(--ease-standard);
            pointer-events: none;
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        @media (max-width: 768px) {
            .welcome-text { font-size: 2.4rem; }
            .info-container { grid-template-columns: 1fr; }
            .sidebar { width: calc(100vw - 28px); }
        }
        @media (max-width: 480px) {
            header { padding: 12px 16px; margin: 10px; }
            .welcome-text { font-size: 2rem; }
            .title { font-size: 1.4rem; }
            .sub-text { font-size: 1.15rem; }
            .time-display { font-size: 1.15rem; padding: 12px 18px; flex-direction: column; }
            .time-icon { margin: 0 0 8px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            body::before { animation: none; }
        }
    </style>
    <script src="protect.js"></script>
</head>

    <script src="i18n.js"></script>
    <script>
        // 地址栏规范化：根路径重定向到 index.html
        if (window.location.pathname === "/" || window.location.pathname === "") {
            window.history.replaceState({}, "", "/index.html");
        }

        function getBeijingHour() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 8)).getHours();
        }
        function applyTheme(theme) { document.documentElement.setAttribute('data-theme', theme); }
        function setCookie(name, value, days) {
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/';
        }
        function getCookie(name) {
            const c = document.cookie.split('; ').find(row => row.startsWith(name + '='));
            return c ? decodeURIComponent(c.split('=')[1]) : null;
        }
        function initTheme() {
            const saved = getCookie('theme');
            if (saved) applyTheme(saved);
            else applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark');
        }
        initTheme();
        initI18n();

        /* ============ MD3 动态配色：从种子色派生色调 ============ */
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }
        function hsl(h, s, l) { return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }

        // 根据种子色重绘 MD3 色调令牌与壁纸光晕
        function applySeed(seed) {
            const [h, s] = hexToHsl(seed);
            const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';

            root.setProperty('--seed', seed);
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h + 210) % 360, Math.min(s, 70), dark ? 78 : 68));
            root.setProperty('--md-tertiary', hsl((h + 60) % 360, Math.min(s, 80), dark ? 75 : 70));

            // 壁纸取色光晕
            const aL = dark ? 16 : 95, bL = dark ? 14 : 93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s, 60), aL));
            root.setProperty('--bg-grad-2', hsl((h + 30) % 360, Math.min(s, 55), bL - 1));
            root.setProperty('--bg-grad-3', hsl((h + 200) % 360, Math.min(s, 55), aL - 2));
            root.setProperty('--bg-grad-4', hsl((h + 60) % 360, Math.min(s, 55), bL));

            // 玻璃染色随主色微调
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark ? 60 : 55}%, ${dark ? 0.1 : 0.07})`);

            setCookie('seed', seed, 365);
        }
        // 恢复保存的种子色
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);

        document.getElementById('accentDock').addEventListener('click', e => {
            const dot = e.target.closest('.accent-dot');
            if (dot) applySeed(dot.dataset.seed);
        });

        /* ============ 侧边栏：从点击位置展开（液态玻璃自然过渡） ============ */
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        document.getElementById('menuToggle').addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.classList.add('sidebar-open');
        });
        function closeSidebarMenu() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        }
        document.getElementById('closeSidebar').addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) {
            closeSidebarMenu();
            setTimeout(() => { window.location.href = page; }, 320);
        }

        /* ============ 卡片透镜高光：随鼠标移动 ============ */
        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const r = card.getBoundingClientRect();
                card.style.setProperty('--mx', (e.clientX - r.left) + 'px');
                card.style.setProperty('--my', (e.clientY - r.top) + 'px');
            });
        });

        /* ============ 凝胶弹性涟漪反馈 ============ */
        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect();
                const size = Math.max(r.width, r.height);
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }
        document.querySelectorAll('.info-card, .menu-item, .menu-btn, .search-btn, .close-btn').forEach(addRipple);

        /* ============ 时间显示 ============ */
        function updateTimeDisplay() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bj = new Date(utc + (3600000 * 8));
            document.getElementById('beijing-time').textContent =
                bj.getHours().toString().padStart(2, '0') + ':' +
                bj.getMinutes().toString().padStart(2, '0') + ':' +
                bj.getSeconds().toString().padStart(2, '0');
        }
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 1000);

        document.getElementById('searchToggle').addEventListener('click', function () {
            window.location.href = 'search.html';
        });
    </script>
</body>
</html>
