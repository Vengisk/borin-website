<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子 - ぼりんの网站</title>
    <meta name="description" content="帖子动态 - 浏览和发布帖子，分享你的想法和创意" />
    <link rel="alternate" hreflang="zh-CN" href="https://vengisk.cc.cd/post.html" />

    <link rel="alternate" hreflang="en" href="https://vengisk.cc.cd/post.html" />
    <link rel="alternate" hreflang="ja" href="https://vengisk.cc.cd/post.html" />
    <link rel="alternate" hreflang="x-default" href="https://vengisk.cc.cd/post.html" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        /* ============================================================
           MD3 + Liquid Glass 融合设计系统
        ============================================================ */
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4;
            --bg-grad-2: #ffe9ef;
            --bg-grad-3: #f3e9ff;
            --bg-grad-4: #e9f3ff;

            --md-primary: #fb7299;
            --md-primary-hover: #e55a80;
            --md-on-primary: #ffffff;
            --md-secondary: #86a8e7;
            --md-tertiary: #feb47b;
            --md-error: #e74c3c;

            --text-primary: #2a1f24;
            --text-secondary: #6b5a60;

            --glass-fill: rgba(255, 255, 255, 0.45);
            --glass-fill-strong: rgba(255, 255, 255, 0.6);
            --glass-stroke: rgba(255, 255, 255, 0.7);
            --glass-stroke-soft: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(180, 120, 140, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-tint: rgba(251, 114, 153, 0.06);
            --blur: 18px;

            --shape-xs: 10px;
            --shape-sm: 16px;
            --shape-md: 22px;
            --shape-lg: 28px;
            --shape-xl: 36px;
            --shape-full: 999px;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.2, 0.9, 0.3, 1.2);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f;
            --bg-grad-2: #181430;
            --bg-grad-3: #0f1b3a;
            --bg-grad-4: #1a1430;

            --md-primary: #fb7299;
            --md-primary-hover: #ff8fad;
            --md-on-primary: #2a0e18;
            --md-secondary: #9db8ff;
            --md-tertiary: #ffc99b;
            --md-error: #ff6b5b;

            --text-primary: #f2eef0;
            --text-secondary: #b7adc4;

            --glass-fill: rgba(40, 44, 70, 0.4);
            --glass-fill-strong: rgba(50, 54, 84, 0.55);
            --glass-stroke: rgba(160, 175, 230, 0.4);
            --glass-stroke-soft: rgba(160, 175, 230, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.45);
            --glass-highlight: rgba(200, 215, 255, 0.5);
            --glass-tint: rgba(120, 140, 220, 0.08);
            --blur: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', 'Noto Sans SC', 'Segoe UI', Tahoma, sans-serif; }

        body {
            min-height: 100vh;
            position: relative;
            background: var(--bg-grad-1);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: color 0.4s var(--ease-standard);
        }
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: auroraFlow 22s ease-in-out infinite;
            filter: saturate(1.1);
            transition: background 0.6s ease;
        }
        @keyframes auroraFlow { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }
        body.sidebar-open { overflow: hidden; }

        /* ================= 顶部栏 ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            position: sticky;
            top: 14px;
            z-index: 100;
        }
        .menu-btn, .search-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--shape-full);
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .menu-btn:hover, .search-btn:hover { background: var(--md-primary); color: var(--md-on-primary); transform: scale(1.08); border-radius: var(--shape-md); }
        .menu-btn:active, .search-btn:active { transform: scale(0.92); }
        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--md-primary), var(--md-tertiary), var(--md-secondary), var(--md-primary));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleFlow 5s linear infinite;
        }
        @keyframes titleFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* ================= 侧边栏 ================= */
        .sidebar {
            position: fixed;
            top: 14px;
            left: -380px;
            width: 340px;
            max-height: calc(100vh - 28px);
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            z-index: 1000;
            transition: left 0.55s var(--spring-soft);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .sidebar.open { left: 14px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px 18px; border-bottom: 1px solid var(--glass-stroke-soft); }
        .close-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: var(--shape-full);
            transition: transform 0.5s var(--spring), background 0.3s ease;
        }
        .close-btn:hover { color: var(--md-on-primary); background: var(--md-primary); transform: rotate(90deg); }
        .sidebar-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-secondary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-menu { padding: 22px 0; }
        .menu-item {
            padding: 15px 18px;
            margin: 12px 0;
            border-radius: var(--shape-md);
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--glass-fill);
            border: 1px solid var(--glass-stroke-soft);
            transition: transform 0.5s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover { background: var(--glass-tint); transform: translateX(8px); border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm); border-color: var(--md-primary); }
        .menu-item:active { transform: translateX(8px) scale(0.97); }
        .menu-item i { margin-right: 14px; font-size: 1.35rem; width: 30px; text-align: center; }
        .bilibili-icon { color: var(--md-primary); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-standard);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* ================= 主内容 ================= */
        main { flex: 1; padding: 20px 20px 30px; display: flex; flex-direction: column; align-items: center; }
        .post-container { max-width: 900px; width: 100%; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 15px; }
        .page-title {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-tertiary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 11px 22px;
            border-radius: var(--shape-full);
            text-decoration: none;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
        }
        .back-btn:hover { background: var(--glass-tint); transform: translateX(-6px); border-radius: var(--shape-md); border-color: var(--md-primary); }
        .back-btn i { margin-right: 8px; }

        .tags-section {
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border-radius: var(--shape-lg);
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        }
        .tags-title { font-size: 1.15rem; font-weight: 700; color: var(--md-secondary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .tags-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag-item {
            padding: 8px 16px;
            background: var(--glass-tint);
            border-radius: var(--shape-full);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--glass-stroke-soft);
            transition: transform 0.4s var(--spring), background 0.3s ease, border-color 0.3s ease, border-radius 0.4s var(--spring);
        }
        .tag-item:hover { transform: translateY(-2px); border-color: var(--md-primary); }
        .tag-item.active { border-color: var(--md-primary); background: var(--glass-fill-strong); border-radius: var(--shape-md); }
        .tag-count { background: var(--md-primary); color: var(--md-on-primary); padding: 2px 8px; border-radius: var(--shape-full); font-size: 0.78rem; margin-left: 5px; }

        .posts-list { display: flex; flex-direction: column; gap: 18px; }
        .post-card {
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border-radius: var(--shape-lg);
            padding: 25px;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            position: relative;
            cursor: pointer;
            transition: transform 0.5s var(--spring), box-shadow 0.4s ease, border-color 0.3s ease, border-radius 0.5s var(--spring);
            animation: cardReveal 0.55s var(--spring-soft) both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
        .post-card:nth-child(1) { animation-delay: 50ms; }
        .post-card:nth-child(2) { animation-delay: 100ms; }
        .post-card:nth-child(3) { animation-delay: 150ms; }
        .post-card:nth-child(4) { animation-delay: 200ms; }
        .post-card:nth-child(5) { animation-delay: 250ms; }
        .post-card:nth-child(n+6) { animation-delay: 300ms; }
        .post-card:hover { transform: translateY(-5px); border-color: var(--md-primary); border-radius: var(--shape-xl) var(--shape-sm) var(--shape-xl) var(--shape-sm); box-shadow: 0 18px 44px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight); }
        .post-card:active { transform: translateY(-2px) scale(0.99); }
        .post-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
        .post-excerpt { color: var(--text-secondary); margin-bottom: 15px; line-height: 1.6; }
        .post-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.88rem; color: var(--text-secondary); flex-wrap: wrap; gap: 10px; }
        .post-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .post-tag { color: var(--md-primary); font-weight: 600; }

        .post-actions { position: absolute; top: 15px; right: 15px; display: none; gap: 8px; }
        .post-card:hover .post-actions { display: flex; }
        .action-btn {
            background: var(--glass-fill-strong);
            border: 1px solid var(--glass-stroke-soft);
            width: 36px;
            height: 36px;
            border-radius: var(--shape-full);
            cursor: pointer;
            color: var(--text-secondary);
            transition: transform 0.4s var(--spring), background 0.3s, color 0.3s, border-radius 0.4s var(--spring);
        }
        .action-btn:hover { background: var(--md-primary); color: var(--md-on-primary); transform: scale(1.1); border-radius: var(--shape-sm); }
        .action-btn.delete:hover { background: var(--md-error); color: #fff; }

        .no-posts { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
        .no-posts i { font-size: 3rem; margin-bottom: 15px; display: block; opacity: 0.4; color: var(--md-primary); }

        /* ================= 浮动操作按钮（液态玻璃 FAB） ================= */
        .fab-btn {
            position: fixed;
            bottom: 26px;
            right: 26px;
            width: 62px;
            height: 62px;
            border-radius: var(--shape-lg);
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(251, 114, 153, 0.45);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s var(--spring), border-radius 0.5s var(--spring), box-shadow 0.3s ease;
        }
        .fab-btn:hover { transform: scale(1.1) rotate(90deg); border-radius: var(--shape-full); box-shadow: 0 14px 38px rgba(251, 114, 153, 0.55); }
        .fab-btn:active { transform: scale(0.95) rotate(90deg); }

        /* ================= 模态框（液态玻璃浮层，从中心弹出） ================= */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: var(--shape-xl);
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 24px 70px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            animation: modalPop 0.45s var(--spring) both;
        }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.85) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-tertiary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-close { background: var(--glass-tint); border: 1px solid var(--glass-stroke-soft); font-size: 1.2rem; color: var(--text-secondary); cursor: pointer; width: 40px; height: 40px; border-radius: var(--shape-full); transition: transform 0.5s var(--spring), background 0.3s, color 0.3s; }
        .modal-close:hover { background: var(--md-primary); color: var(--md-on-primary); transform: rotate(90deg); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--md-secondary); font-size: 0.95rem; font-weight: 600; }
        .form-input {
            width: 100%;
            padding: 13px 16px;
            background: var(--glass-tint);
            border: 2px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease, border-radius 0.4s var(--spring);
        }
        .form-input:focus { outline: none; border-color: var(--md-primary); border-radius: var(--shape-lg); }
        .form-textarea { min-height: 150px; resize: vertical; }

        .image-preview { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--shape-sm); }
        .add-image-btn {
            padding: 10px 20px;
            background: var(--glass-tint);
            border: 2px dashed var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-block;
            transition: border-color 0.3s ease, color 0.3s ease;
        }
        .add-image-btn:hover { border-color: var(--md-primary); color: var(--md-primary); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            border-radius: var(--shape-full);
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
        }
        .submit-btn:hover { background: var(--md-primary-hover); transform: translateY(-3px); border-radius: var(--shape-md); }
        .submit-btn:active { transform: translateY(-1px) scale(0.98); }

        .auth-section {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            padding: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        .auth-section p { font-weight: 600; margin-bottom: 12px; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .loading-box {
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            padding: 30px 50px;
            border-radius: var(--shape-xl);
            text-align: center;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        }
        .loading-box i { font-size: 2rem; color: var(--md-primary); margin-bottom: 15px; display: block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 15px 30px;
            border-radius: var(--shape-full);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 12px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            z-index: 4000;
            transition: transform 0.5s var(--spring-soft);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--md-error); color: var(--md-error); }

        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .copyright { color: var(--text-secondary); font-weight: 500; }

        .ripple { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.5); transform: scale(0); animation: rippleEffect 0.6s var(--ease-standard); pointer-events: none; }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 768px) {
            .page-title { font-size: 1.9rem; }
            .post-actions { display: flex; }
            .sidebar { width: calc(100vw - 28px); }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            body::before { animation: none; }
        }
    </style>
    <script src="protect.js"></script>
</head>
<body class="page-transition">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title" data-i18n="sidebarTitle">ぼりんの菜单</h2>
            <button class="close-btn" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigate('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span data-i18n="menuBilibili">B站热门视频</span></div>
            <div class="menu-item" onclick="navigate('post.html')"><i class="fas fa-newspaper"></i><span data-i18n="menuPost">帖子动态</span></div>
            <div class="menu-item" onclick="navigate('settings.html')"><i class="fas fa-cog"></i><span data-i18n="menuSettings">设置</span></div>
            <div class="menu-item" onclick="navigate('about.html')"><i class="fas fa-info-circle"></i><span data-i18n="menuAbout">关于我们</span></div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <div class="loading-overlay" id="loading"><div class="loading-box"><i class="fas fa-spinner"></i><p id="loadingText" data-i18n="loading">加载中...</p></div></div>
    <div class="toast" id="toast"></div>
    <button class="fab-btn" onclick="openEditor()"><i class="fas fa-pencil-alt"></i></button>

    <div class="modal" id="editorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="editorTitle" data-i18n="editorNewTitle">发布新帖子</h3>
                <button class="modal-close" onclick="closeEditor()"><i class="fas fa-times"></i></button>
            </div>
            <div class="auth-section" id="authSection">
                <p data-i18n="enterPassword">请输入管理密码</p>
                <input type="password" class="form-input" id="authKey" placeholder="输入密码..." data-i18n-placeholder="passwordPlaceholder" style="max-width:300px;margin:0 auto;display:block">
                <button class="submit-btn" style="max-width:200px;margin:15px auto 0;display:block" onclick="verifyKey()" data-i18n="verify">验证</button>
            </div>
            <form id="postForm" style="display:none" onsubmit="submitPost(event)">
                <input type="hidden" id="editPostId">
                <div class="form-group">
                    <label class="form-label" data-i18n="postTitleLabel">帖子标题</label>
                    <input type="text" class="form-input" id="postTitle" placeholder="输入标题..." data-i18n-placeholder="titlePlaceholder" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="tagsLabel">标签 (如: #日常 #技术)</label>
                    <input type="text" class="form-input" id="postTags" placeholder="#日常 #分享..." data-i18n-placeholder="tagsPlaceholder">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="contentLabel">帖子内容</label>
                    <textarea class="form-input form-textarea" id="postContent" placeholder="写下你的想法..." data-i18n-placeholder="contentPlaceholder" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="addImageLabel">添加图片 (最多5张，可选)</label>
                    <label class="add-image-btn"><i class="fas fa-image"></i> <span data-i18n="selectImage">选择图片</span><input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImages(event)"></label>
                    <div class="image-preview" id="imagePreview"></div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn" data-i18n="publishPost">发布帖子</button>
            </form>
        </div>
    </div>

    <header>
        <button class="menu-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
        <h1 class="title" data-i18n="menuPost">帖子动态</h1>
        <button class="search-btn" onclick="location.href='search.html'"><i class="fas fa-search"></i></button>
    </header>

    <main>
        <div class="post-container">
            <div class="page-header">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="backHome">返回首页</span></a>
                <h2 class="page-title" data-i18n="myPosts">我的帖子</h2>
            </div>
            <div class="tags-section">
                <h3 class="tags-title"><i class="fas fa-tags"></i> <span data-i18n="tagsCategory">标签分类</span></h3>
                <div class="tags-list" id="tagsList"></div>
            </div>
            <div class="posts-list" id="postsList"></div>
        </div>
    </main>

    <footer>
        <div class="copyright" data-i18n="footerPost">© 2026 ぼりんの网站 | 帖子动态</div>
    </footer>

    <script src="i18n.js"></script>
    <script>
        // ===== 配置：前端不再持有任何机密 =====
        const API_POSTS = '/api/posts';
        const API_VERIFY = '/api/verify';

        let posts = [], currentFilter = null, uploadedImages = [], isAuthenticated = false, editingId = null;
        let authToken = null;

        // ===== HTML 转义：防止帖子内容中的 HTML/脚本注入 =====
        function esc(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ===== 工具函数 =====
        function getBeijingHour() { const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000; return new Date(u + 28800000).getHours(); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function initTheme() { const s = getCookie('theme'); applyTheme(s || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }

        function showLoading(show, text = '加载中...') { document.getElementById('loadingText').textContent = text; document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        function showToast(msg, isError = false) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : ''); setTimeout(() => t.classList.remove('show'), 2500); }

        function formatDate(d) { const n = new Date(d); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
        function extractTags(t) { return (t.match(/#[\u4e00-\u9fa5a-zA-Z0-9_]+/g) || []).map(x => x.substring(1)); }

        // ===== MD3 动态配色（继承首页种子色） =====
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }
        function hsl(h, s, l) { return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }
        function applySeed(seed) {
            const [h, s] = hexToHsl(seed);
            const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--seed', seed);
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h + 210) % 360, Math.min(s, 70), dark ? 78 : 68));
            root.setProperty('--md-tertiary', hsl((h + 60) % 360, Math.min(s, 80), dark ? 75 : 70));
            const aL = dark ? 16 : 95, bL = dark ? 14 : 93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s, 60), aL));
            root.setProperty('--bg-grad-2', hsl((h + 30) % 360, Math.min(s, 55), bL - 1));
            root.setProperty('--bg-grad-3', hsl((h + 200) % 360, Math.min(s, 55), aL - 2));
            root.setProperty('--bg-grad-4', hsl((h + 60) % 360, Math.min(s, 55), bL));
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark ? 60 : 55}%, ${dark ? 0.1 : 0.07})`);
        }

        initTheme();
        initI18n();
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);

        // ===== 数据操作 =====
        async function loadPosts() {
            showLoading(true, t('loadingPosts'));
            const localPosts = JSON.parse(localStorage.getItem('borin_posts') || '[]');
            try {
                const res = await fetch(API_POSTS);
                const d = await res.json();
                const remotePosts = d.posts || [];
                const localIds = new Set(localPosts.map(p => p.id));
                const newFromRemote = remotePosts.filter(p => !localIds.has(p.id));
                posts = [...localPosts, ...newFromRemote];
                posts.sort((a, b) => b.id - a.id);
                localStorage.setItem('borin_posts', JSON.stringify(posts));
            } catch(e) {
                posts = localPosts;
            }
            showLoading(false);
            renderTags();
            renderPosts();
        }

        async function savePosts() {
            localStorage.setItem('borin_posts', JSON.stringify(posts));
            if (!authToken) { showToast(t('verifyFirst'), true); return false; }
            try {
                const res = await fetch(API_POSTS, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                    body: JSON.stringify({ posts }),
                });
                if (res.status === 401) {
                    isAuthenticated = false; authToken = null;
                    showToast(t('authExpired'), true);
                    return false;
                }
                return res.ok;
            } catch (e) {
                console.log('云端同步失败');
                return false;
            }
        }

        // ===== UI =====
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); document.body.classList.add('sidebar-open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        function navigate(p) { closeSidebar(); setTimeout(() => location.href = p, 250); }

        async function verifyKey() {
            const input = document.getElementById('authKey').value;
            if (!input) return showToast(t('enterPassword'), true);
            try {
                const res = await fetch(API_VERIFY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: input }),
                });
                if (!res.ok) return showToast(t('wrongPassword'), true);
                const d = await res.json();
                authToken = d.token;
                isAuthenticated = true;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('postForm').style.display = 'block';
                document.getElementById('authKey').value = '';
            } catch (e) {
                showToast(t('verifyFailed'), true);
            }
        }

        function openEditor(id = null) {
            editingId = id;
            document.getElementById('editorModal').classList.add('show');
            document.getElementById('editorTitle').textContent = id ? t('editorEditTitle') : t('editorNewTitle');
            document.getElementById('submitBtn').textContent = id ? t('saveChanges') : t('publishPost');

            if (id) {
                const post = posts.find(p => p.id === id);
                if (post) {
                    document.getElementById('postTitle').value = post.title;
                    document.getElementById('postTags').value = (post.tags || []).map(t => '#' + t).join(' ');
                    document.getElementById('postContent').value = post.content;
                    document.getElementById('editPostId').value = id;
                    uploadedImages = post.images || [];
                    renderImagePreview();
                }
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('postForm').style.display = 'block';
            } else {
                document.getElementById('editPostId').value = '';
                if (isAuthenticated) {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('postForm').style.display = 'block';
                } else {
                    document.getElementById('authSection').style.display = 'block';
                    document.getElementById('postForm').style.display = 'none';
                }
            }
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
            document.getElementById('authKey').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postTags').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            uploadedImages = [];
            editingId = null;
        }

        function handleImages(e) {
            const files = e.target.files;
            for (let file of files) {
                if (uploadedImages.length >= 5) { showToast(t('maxImages'), true); break; }
                const reader = new FileReader();
                reader.onload = ev => { uploadedImages.push(ev.target.result); renderImagePreview(); };
                reader.readAsDataURL(file);
            }
        }

        function renderImagePreview() {
            document.getElementById('imagePreview').innerHTML = uploadedImages.map((img, i) =>
                '<div style="position:relative;display:inline-block"><img src="' + esc(img) + '"><button type="button" onclick="removeImage(' + i + ')" style="position:absolute;top:-5px;right:-5px;background:var(--md-error);color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer">×</button></div>'
            ).join('');
        }

        function removeImage(i) { uploadedImages.splice(i, 1); renderImagePreview(); }

        function renderTags() {
            const tc = {};
            posts.forEach(p => (p.tags || []).forEach(t => tc[t] = (tc[t] || 0) + 1));
            const list = document.getElementById('tagsList');
            if (!Object.keys(tc).length) { list.innerHTML = '<span style="color:var(--text-secondary)">' + t('noTags') + '</span>'; return; }
            let html = '<div class="tag-item' + (currentFilter === null ? ' active' : '') + '" onclick="filterByTag(null)">' + t('all') + ' <span class="tag-count">' + posts.length + '</span></div>';
            for (let t in tc) {
                html += '<div class="tag-item' + (currentFilter === t ? ' active' : '') + '" onclick="filterByTag(this.dataset.tag)" data-tag="' + esc(t) + '">#' + esc(t) + ' <span class="tag-count">' + tc[t] + '</span></div>';
            }
            list.innerHTML = html;
        }

        function filterByTag(t) { currentFilter = t; renderTags(); renderPosts(); }

        function renderPosts() {
            const list = document.getElementById('postsList');
            let filtered = currentFilter ? posts.filter(p => (p.tags || []).includes(currentFilter)) : posts;
            if (!filtered.length) { list.innerHTML = '<div class="no-posts"><i class="fas fa-inbox"></i><p>' + t('noPosts') + '</p><p style="font-size:1rem;margin-top:10px">' + t('noPostsHint') + '</p></div>'; return; }
            filtered = filtered.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = filtered.map(p => {
                const content = p.content || '';
                const excerpt = content.length > 150 ? content.substring(0, 150) + '...' : content;
                const tags = (p.tags || []).map(t => '<span class="post-tag">#' + esc(t) + '</span>').join(' ');
                return '<div class="post-card" onclick="openPost(' + p.id + ')"><div class="post-actions"><button class="action-btn" onclick="event.stopPropagation();openEditor(' + p.id + ')" title="编辑"><i class="fas fa-edit"></i></button><button class="action-btn delete" onclick="event.stopPropagation();deletePost(' + p.id + ')" title="删除"><i class="fas fa-trash"></i></button></div><h3 class="post-title">' + esc(p.title) + '</h3><p class="post-excerpt">' + esc(excerpt) + '</p><div class="post-meta"><div class="post-tags">' + tags + '</div><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-calendar"></i> ' + esc(formatDate(p.date)) + ' <span style="color:var(--md-secondary)">(' + esc(getTimeAgo(p.date)) + ')</span></div></div></div>';
            }).join('');
        }

        function openPost(id) { location.href = 'p/?id=' + id; }

        async function deletePost(id) {
            if (!isAuthenticated) { showToast(t('verifyFirst'), true); return; }
            if (!confirm(t('confirmDelete'))) return;
            posts = posts.filter(p => p.id !== id);
            await savePosts();
            renderTags();
            renderPosts();
            showToast(t('deleteSuccess'));
        }

        async function submitPost(e) {
            e.preventDefault();
            if (!isAuthenticated) return showToast(t('verifyFirst'), true);
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!title || !content) return showToast(t('fillTitleContent'), true);

            showLoading(true, editingId ? t('saving') : t('publishing'));

            const editId = document.getElementById('editPostId').value;
            if (editId) {
                const idx = posts.findIndex(p => p.id === parseInt(editId));
                if (idx !== -1) {
                    posts[idx] = { ...posts[idx], title, content, tags: extractTags(document.getElementById('postTags').value), images: uploadedImages };
                }
            } else {
                posts.push({
                    id: posts.length ? Math.max(...posts.map(p => p.id)) + 1 : 1,
                    title, content,
                    tags: extractTags(document.getElementById('postTags').value),
                    images: uploadedImages.slice(0, 5),
                    date: new Date().toISOString(),
                    comments: []
                });
            }

            await savePosts();
            showLoading(false);
            closeEditor();
            renderTags();
            renderPosts();
            showToast(editingId ? t('editSuccess') : t('publishSuccess'));
        }

        // ===== 涟漪反馈 =====
        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect();
                const size = Math.max(r.width, r.height);
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }
        document.querySelectorAll('.menu-item, .menu-btn, .search-btn, .fab-btn').forEach(addRipple);

        loadPosts();
    </script>
</body>
