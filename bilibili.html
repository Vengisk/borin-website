<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站热门视频 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        /* ============================================================
           MD3 + Liquid Glass 融合设计系统
        ============================================================ */
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4;
            --bg-grad-2: #ffe9ef;
            --bg-grad-3: #f3e9ff;
            --bg-grad-4: #e9f3ff;

            --md-primary: #fb7299;
            --md-primary-hover: #e55a80;
            --md-on-primary: #ffffff;
            --md-secondary: #86a8e7;
            --md-tertiary: #feb47b;

            --text-primary: #2a1f24;
            --text-secondary: #6b5a60;

            --glass-fill: rgba(255, 255, 255, 0.45);
            --glass-fill-strong: rgba(255, 255, 255, 0.6);
            --glass-stroke: rgba(255, 255, 255, 0.7);
            --glass-stroke-soft: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(180, 120, 140, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-tint: rgba(251, 114, 153, 0.06);
            --blur: 18px;

            --shape-xs: 10px;
            --shape-sm: 16px;
            --shape-md: 22px;
            --shape-lg: 28px;
            --shape-xl: 36px;
            --shape-full: 999px;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.2, 0.9, 0.3, 1.2);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f;
            --bg-grad-2: #181430;
            --bg-grad-3: #0f1b3a;
            --bg-grad-4: #1a1430;

            --md-primary: #fb7299;
            --md-primary-hover: #ff8fad;
            --md-on-primary: #2a0e18;
            --md-secondary: #9db8ff;
            --md-tertiary: #ffc99b;

            --text-primary: #f2eef0;
            --text-secondary: #b7adc4;

            --glass-fill: rgba(40, 44, 70, 0.4);
            --glass-fill-strong: rgba(50, 54, 84, 0.55);
            --glass-stroke: rgba(160, 175, 230, 0.4);
            --glass-stroke-soft: rgba(160, 175, 230, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.45);
            --glass-highlight: rgba(200, 215, 255, 0.5);
            --glass-tint: rgba(120, 140, 220, 0.08);
            --blur: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', 'Noto Sans SC', 'Segoe UI', Tahoma, sans-serif; }

        body {
            min-height: 100vh;
            position: relative;
            background: var(--bg-grad-1);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: color 0.4s var(--ease-standard);
        }
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: auroraFlow 22s ease-in-out infinite;
            filter: saturate(1.1);
            transition: background 0.6s ease;
        }
        @keyframes auroraFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        body.sidebar-open { overflow: hidden; }

        /* ================= 顶部栏 ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            position: sticky;
            top: 14px;
            z-index: 100;
        }
        .menu-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--shape-full);
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
            z-index: 101;
        }
        .menu-btn:hover {
            background: var(--md-primary);
            color: var(--md-on-primary);
            transform: scale(1.08);
            border-radius: var(--shape-md);
        }
        .menu-btn:active { transform: scale(0.92); }

        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary), var(--md-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================= 侧边栏 ================= */
        .sidebar {
            position: fixed;
            top: 14px;
            left: -380px;
            width: 340px;
            max-height: calc(100vh - 28px);
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            z-index: 1000;
            transition: left 0.55s var(--spring-soft);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .sidebar.open { left: 14px; }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px 18px;
            border-bottom: 1px solid var(--glass-stroke-soft);
        }
        .close-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            width: 42px;
            height: 42px;
            border-radius: var(--shape-full);
            transition: transform 0.5s var(--spring), background 0.3s ease;
        }
        .close-btn:hover { color: var(--md-on-primary); background: var(--md-primary); transform: rotate(90deg); }
        .sidebar-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(110deg, var(--md-secondary), var(--md-primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-menu { padding: 22px 0; }
        .menu-item {
            padding: 15px 18px;
            margin: 12px 0;
            border-radius: var(--shape-md);
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            background: var(--glass-fill);
            border: 1px solid var(--glass-stroke-soft);
            transition: transform 0.5s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .menu-item:hover {
            background: var(--glass-tint);
            transform: translateX(8px);
            border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm);
            border-color: var(--md-primary);
        }
        .menu-item:active { transform: translateX(8px) scale(0.97); }
        .menu-item i { margin-right: 14px; font-size: 1.35rem; width: 30px; text-align: center; }
        .bilibili-icon { color: var(--md-primary); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 15, 25, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--ease-standard);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* ================= 主内容 ================= */
        main { flex: 1; padding: 20px 20px 30px; max-width: 1200px; width: 100%; margin: 0 auto; }
        .page-title {
            font-size: 2.4rem;
            font-weight: 700;
            text-align: center;
            margin: 16px 0 36px;
            background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .videos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 20px; }

        /* 液态玻璃视频卡 */
        .video-card {
            position: relative;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            border-radius: var(--shape-lg);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.5s var(--spring), box-shadow 0.4s ease, border-color 0.3s ease, border-radius 0.5s var(--spring);
            animation: cardReveal 0.6s var(--spring-soft) both;
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .video-card:nth-child(1) { animation-delay: 50ms; }
        .video-card:nth-child(2) { animation-delay: 100ms; }
        .video-card:nth-child(3) { animation-delay: 150ms; }
        .video-card:nth-child(4) { animation-delay: 200ms; }
        .video-card:nth-child(5) { animation-delay: 250ms; }
        .video-card:nth-child(6) { animation-delay: 300ms; }
        .video-card:nth-child(n+7) { animation-delay: 350ms; }
        .video-card:hover {
            transform: translateY(-8px);
            border-color: var(--md-primary);
            border-radius: var(--shape-xl) var(--shape-sm) var(--shape-xl) var(--shape-sm);
            box-shadow: 0 22px 50px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        }
        .video-card:active { transform: translateY(-2px) scale(0.99); }

        .video-cover {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: linear-gradient(45deg, var(--bg-grad-2), var(--bg-grad-3));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s var(--ease-standard); opacity: 0; }
        .video-card:hover .video-cover img { transform: scale(1.06); }
        .cover-placeholder { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--md-primary); font-size: 3rem; z-index: 1; opacity: 0.6; }
        .video-duration { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); color: #fff; padding: 4px 9px; border-radius: var(--shape-xs); font-size: 0.85rem; font-weight: 600; z-index: 2; }
        .video-info { padding: 16px; }
        .video-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; height: 2.9em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--text-primary); }
        .video-stats { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.88rem; margin-top: 10px; }
        .up-name { display: flex; align-items: center; color: var(--md-secondary); font-weight: 500; }
        .up-name i { margin-right: 5px; font-size: 0.85rem; }
        .views i { margin-right: 4px; }

        .video-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 62px;
            height: 62px;
            background: rgba(251, 114, 153, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--shape-full);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.45s var(--spring);
        }
        .video-card:hover .video-play-btn { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .video-play-btn i { color: white; font-size: 1.6rem; margin-left: 4px; }

        /* ================= 按钮 ================= */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 11px 22px;
            border-radius: var(--shape-full);
            text-decoration: none;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            margin-bottom: 28px;
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .back-btn:hover { background: var(--glass-tint); transform: translateX(-6px); border-radius: var(--shape-md); border-color: var(--md-primary); }
        .back-btn i { margin-right: 8px; }

        .refresh-btn {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            padding: 12px 26px;
            border-radius: var(--shape-full);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            margin-top: 20px;
        }
        .refresh-btn:hover { background: var(--md-primary-hover); transform: translateY(-3px); border-radius: var(--shape-md); }
        .refresh-btn:active { transform: translateY(-1px) scale(0.97); }

        .loading { text-align: center; padding: 60px 20px; font-size: 1.4rem; color: var(--text-secondary); grid-column: 1 / -1; }
        .loading i { font-size: 2.2rem; margin-bottom: 18px; display: block; color: var(--md-primary); animation: spin 1.2s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ================= 通知（液态玻璃浮层） ================= */
        .notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-primary);
            font-weight: 600;
            padding: 15px 26px;
            border-radius: var(--shape-full);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 12px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            z-index: 2000;
            display: flex;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.45s var(--spring-soft);
        }
        .notification.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .notification i { margin-right: 10px; font-size: 1.4rem; color: var(--md-primary); }

        /* ================= 页脚 ================= */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            color: var(--text-secondary);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .copyright { font-size: 1rem; font-weight: 500; color: var(--text-secondary); }

        /* ================= 涟漪 ================= */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s var(--ease-standard);
            pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 768px) {
            .title { font-size: 1.6rem; }
            .sidebar { width: calc(100vw - 28px); }
            .videos-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .page-title { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            header { padding: 12px 16px; margin: 10px; }
            .title { font-size: 1.4rem; }
            .videos-container { grid-template-columns: 1fr; }
            .page-title { font-size: 1.7rem; }
            .video-cover { height: 160px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            body::before { animation: none; }
        }
    </style>
    <script src="protect.js"></script>
</head>

    <script src="i18n.js"></script>
    <script>
        // ============ 主题管理 ============
        function getBeijingHour() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 8)).getHours();
        }
        function initTheme() {
            const savedTheme = getCookie('theme');
            if (savedTheme) setTheme(savedTheme);
            else setTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark');
        }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.querySelector('#themeToggle i');
            icon.className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            setCookie('theme', theme, 365);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
            const savedSeed = getCookie('seed');
            if (savedSeed) applySeed(savedSeed);
        }
        function setCookie(name, value, days) {
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/';
        }
        function getCookie(name) {
            const c = document.cookie.split('; ').find(row => row.startsWith(name + '='));
            return c ? decodeURIComponent(c.split('=')[1]) : null;
        }

        // ============ MD3 动态配色（从首页选择的种子色继承） ============
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }
        function hsl(h, s, l) { return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }
        function applySeed(seed) {
            const [h, s] = hexToHsl(seed);
            const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--seed', seed);
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h + 210) % 360, Math.min(s, 70), dark ? 78 : 68));
            root.setProperty('--md-tertiary', hsl((h + 60) % 360, Math.min(s, 80), dark ? 75 : 70));
            const aL = dark ? 16 : 95, bL = dark ? 14 : 93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s, 60), aL));
            root.setProperty('--bg-grad-2', hsl((h + 30) % 360, Math.min(s, 55), bL - 1));
            root.setProperty('--bg-grad-3', hsl((h + 200) % 360, Math.min(s, 55), aL - 2));
            root.setProperty('--bg-grad-4', hsl((h + 60) % 360, Math.min(s, 55), bL));
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark ? 60 : 55}%, ${dark ? 0.1 : 0.07})`);
        }

        initTheme();
        initI18n();
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);

        // ============ 侧边栏 ============
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notification-text');
        const videosContainer = document.getElementById('videosContainer');

        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebar.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 320); }

        // ============ 涟漪反馈 ============
        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect();
                const size = Math.max(r.width, r.height);
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }
        document.querySelectorAll('.menu-item, .menu-btn').forEach(addRipple);

        // ============ 格式化工具 ============
        function formatViewCount(count) {
            if (count >= 100000000) return (count / 100000000).toFixed(1) + '亿';
            if (count >= 10000) return (count / 10000).toFixed(1) + '万';
            return count.toString();
        }
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = seconds % 60;
            if (h > 0) return h + ':' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
            return m + ':' + s.toString().padStart(2, '0');
        }

        // ============ 获取B站热门视频 ============
        async function fetchBilibiliHot() {
            try {
                const binId = '69abb4bbd0ea881f40f802db';
                const response = await fetch('https://api.jsonbin.io/v3/b/' + binId + '/latest');
                const data = await response.json();
                if (data.record && data.record.bilibili && data.record.bilibili.videos) {
                    return data.record.bilibili.videos;
                }
                return getSampleVideos();
            } catch (error) {
                console.error('获取B站热门失败:', error);
                return getSampleVideos();
            }
        }
        function getSampleVideos() {
            return [
                { bvid: 'BV1xx411c7mD', title: '【热门视频】精彩内容推荐', cover: '', duration: '10:24', up: '热门UP主', views: '100万' },
                { bvid: 'BV1xx411c7mE', title: '今日热点资讯汇总', cover: '', duration: '15:30', up: '资讯频道', views: '89万' },
                { bvid: 'BV1xx411c7mF', title: '超治愈的日常分享', cover: '', duration: '20:15', up: '生活博主', views: '156万' }
            ];
        }
        function renderVideos(videos) {
            if (videos.length === 0) {
                videosContainer.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle"></i><p>' + t('biliFetchError') + '</p><button class="refresh-btn" onclick="loadVideos()"><i class="fas fa-sync-alt"></i> ' + t('reload') + '</button></div>';
                return;
            }
            let html = '';
            videos.forEach(video => {
                html += '<div class="video-card" data-bvid="' + video.bvid + '" data-title="' + video.title + '"><div class="video-cover"><div class="cover-placeholder"><i class="fab fa-bilibili"></i></div><img src="' + video.cover + '" alt="' + video.title + '" loading="lazy" onerror="this.style.display=\'none\'" onload="this.style.opacity=\'1\'"><div class="video-duration">' + video.duration + '</div><div class="video-play-btn"><i class="fas fa-play"></i></div></div><div class="video-info"><h3 class="video-title">' + video.title + '</h3><div class="video-stats"><div class="up-name"><i class="fas fa-user"></i> ' + video.up + '</div><div class="views"><i class="fas fa-eye"></i> ' + video.views + '</div></div></div></div>';
            });
            videosContainer.innerHTML = html;
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', function() { openBilibiliVideo(this.dataset.bvid, this.dataset.title); });
            });
        }
        async function loadVideos() {
            videosContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>' + t('loading') + '</p></div>';
            const videos = await fetchBilibiliHot();
            renderVideos(videos);
        }
        function openBilibiliVideo(bvid, title) {
            notificationText.textContent = t('openingVideo') + title;
            notification.classList.add('show');
            try { window.location.href = 'bilibili://video/' + bvid; } catch (e) {}
            setTimeout(function() {
                if (!document.hidden) window.location.href = 'https://www.bilibili.com/video/' + bvid;
                else notification.classList.remove('show');
            }, 1500);
        }
        loadVideos();
    </script>
</body>
</html>
