<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        /* ============================================================
           MD3 + Liquid Glass 融合设计系统
        ============================================================ */
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4;
            --bg-grad-2: #ffe9ef;
            --bg-grad-3: #f3e9ff;
            --bg-grad-4: #e9f3ff;

            --md-primary: #fb7299;
            --md-primary-hover: #e55a80;
            --md-on-primary: #ffffff;
            --md-secondary: #86a8e7;
            --md-tertiary: #feb47b;

            --text-primary: #2a1f24;
            --text-secondary: #6b5a60;

            --glass-fill: rgba(255, 255, 255, 0.45);
            --glass-fill-strong: rgba(255, 255, 255, 0.6);
            --glass-stroke: rgba(255, 255, 255, 0.7);
            --glass-stroke-soft: rgba(255, 255, 255, 0.35);
            --glass-shadow: rgba(180, 120, 140, 0.18);
            --glass-highlight: rgba(255, 255, 255, 0.9);
            --glass-tint: rgba(251, 114, 153, 0.06);
            --blur: 18px;

            --shape-xs: 10px;
            --shape-sm: 16px;
            --shape-md: 22px;
            --shape-lg: 28px;
            --shape-xl: 36px;
            --shape-full: 999px;

            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.2, 0.9, 0.3, 1.2);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f;
            --bg-grad-2: #181430;
            --bg-grad-3: #0f1b3a;
            --bg-grad-4: #1a1430;

            --md-primary: #fb7299;
            --md-primary-hover: #ff8fad;
            --md-on-primary: #2a0e18;
            --md-secondary: #9db8ff;
            --md-tertiary: #ffc99b;

            --text-primary: #f2eef0;
            --text-secondary: #b7adc4;

            --glass-fill: rgba(40, 44, 70, 0.4);
            --glass-fill-strong: rgba(50, 54, 84, 0.55);
            --glass-stroke: rgba(160, 175, 230, 0.4);
            --glass-stroke-soft: rgba(160, 175, 230, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.45);
            --glass-highlight: rgba(200, 215, 255, 0.5);
            --glass-tint: rgba(120, 140, 220, 0.08);
            --blur: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', 'Noto Sans SC', 'Segoe UI', Tahoma, sans-serif; }

        body {
            min-height: 100vh;
            position: relative;
            background: var(--bg-grad-1);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            transition: color 0.4s var(--ease-standard);
        }
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%;
            animation: auroraFlow 22s ease-in-out infinite;
            filter: saturate(1.1);
            transition: background 0.6s ease;
        }
        @keyframes auroraFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* ================= 顶部栏 ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill-strong);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            position: sticky;
            top: 14px;
            z-index: 100;
        }
        .back-btn, .menu-btn {
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border-radius: var(--shape-full);
            text-decoration: none;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .back-btn:hover, .menu-btn:hover {
            background: var(--md-primary);
            color: var(--md-on-primary);
            transform: scale(1.08);
            border-radius: var(--shape-md);
        }
        .back-btn:active, .menu-btn:active { transform: scale(0.92); }
        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary), var(--md-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================= 主内容 ================= */
        main { flex: 1; padding: 20px 20px 30px; display: flex; flex-direction: column; align-items: center; }
        .search-container { max-width: 820px; width: 100%; }

        .search-box { display: flex; gap: 14px; margin-bottom: 26px; }
        .search-input {
            flex: 1;
            padding: 16px 22px;
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 2px solid var(--glass-stroke-soft);
            border-radius: var(--shape-full);
            color: var(--text-primary);
            font-size: 1.05rem;
            font-family: inherit;
            font-weight: 500;
            box-shadow: inset 0 1px 0 var(--glass-highlight);
            transition: border-color 0.3s ease, border-radius 0.4s var(--spring);
        }
        .search-input::placeholder { color: var(--text-secondary); }
        .search-input:focus { outline: none; border-color: var(--md-primary); border-radius: var(--shape-lg); }

        .search-btn {
            padding: 0 30px;
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            border-radius: var(--shape-full);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring);
            position: relative;
            overflow: hidden;
        }
        .search-btn:hover { background: var(--md-primary-hover); transform: translateY(-3px); border-radius: var(--shape-md); }
        .search-btn:active { transform: translateY(-1px) scale(0.96); }

        .search-tips, .results-section {
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
        }
        .search-tips {
            border-radius: var(--shape-lg);
            padding: 22px;
            margin-bottom: 20px;
            animation: cardReveal 0.5s var(--spring-soft) both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .search-tips h3 { color: var(--md-secondary); margin-bottom: 10px; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .search-tips p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7; }

        .results-section { border-radius: var(--shape-xl); padding: 26px; animation: cardReveal 0.5s var(--spring-soft) 0.05s both; }
        .results-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--md-tertiary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .results-title i { color: var(--md-primary); }

        .result-category { margin-bottom: 24px; }
        .result-category h4 {
            color: var(--md-secondary);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-stroke-soft);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-item {
            padding: 15px 18px;
            background: var(--glass-tint);
            border: 1px solid var(--glass-stroke-soft);
            border-radius: var(--shape-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring), border-color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .result-item:hover {
            background: var(--glass-fill-strong);
            transform: translateX(8px);
            border-color: var(--md-primary);
            border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm);
        }
        .result-item:active { transform: translateX(8px) scale(0.98); }
        .result-item > i { font-size: 1.5rem; color: var(--md-primary); width: 30px; text-align: center; }
        .result-item-content h5 { font-size: 1.05rem; font-weight: 600; margin-bottom: 5px; }
        .result-item-content p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.5; }
        .result-tag {
            display: inline-block;
            background: var(--glass-tint);
            border: 1px solid var(--md-primary);
            color: var(--md-primary);
            padding: 2px 10px;
            border-radius: var(--shape-full);
            font-size: 0.78rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .no-results { text-align: center; padding: 44px 20px; color: var(--text-secondary); }
        .no-results i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.4; color: var(--md-primary); }

        /* ================= 页脚 ================= */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px;
            margin: 14px;
            border-radius: var(--shape-xl);
            background: var(--glass-fill);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
        }
        .time-display {
            display: flex;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--glass-tint);
            padding: 13px 26px;
            border-radius: var(--shape-md);
            border: 1px solid var(--glass-stroke-soft);
        }
        .time-label { color: var(--md-secondary); margin-right: 10px; }
        .time-value { color: var(--md-tertiary); font-variant-numeric: tabular-nums; }
        .time-icon { margin-right: 14px; font-size: 1.5rem; color: var(--md-primary); animation: pulse 2s var(--spring-soft) infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .copyright { margin-top: 18px; color: var(--text-secondary); font-weight: 500; }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: rippleEffect 0.6s var(--ease-standard);
            pointer-events: none;
        }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 600px) {
            .title { font-size: 1.5rem; }
            .search-box { flex-direction: column; }
            .search-btn { padding: 14px; }
            .time-display { font-size: 1.15rem; flex-direction: column; }
            .time-icon { margin: 0 0 8px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
            body::before { animation: none; }
        }
    </style>
    <script src="protect.js"></script>
</head>
<body class="page-transition">
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="title" data-i18n="search">搜索</h1>
        <button class="menu-btn" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
    </header>

    <main>
        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="搜索功能、帖子、标签..." autofocus>
                <button class="search-btn" onclick="performSearch()"><i class="fas fa-search"></i></button>
            </div>

            <div class="search-tips">
                <h3><i class="fas fa-lightbulb"></i> <span data-i18n="searchTips">搜索提示</span></h3>
                <p data-i18n="searchTipsContent">• 输入关键词搜索网站功能和帖子内容<br>• 使用 #标签 搜索特定标签的帖子<br>• 支持搜索：设置、B站视频、关于、帖子标题、帖子内容、标签</p>
            </div>

            <div class="results-section">
                <h3 class="results-title"><i class="fas fa-search"></i> <span data-i18n="searchResults">搜索结果</span> <span id="resultCount"></span></h3>
                <div id="resultsContent">
                    <div class="no-results"><i class="fas fa-hand-point-up"></i><p data-i18n="startSearch">输入关键词开始搜索</p></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label" data-i18n="beijingTime">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright" data-i18n="footerSearch">© 2026 ぼりんの网站 | 搜索页面</div>
    </footer>

    <script src="i18n.js"></script>
    <script>
        // ============ 配置 ============
        const API_POSTS = '/api/posts';

        let posts = [];

        // 功能菜单数据
        const menuItems = [
            { name: 'B站热门视频', desc: '查看B站热门视频排行', icon: 'fab fa-bilibili', url: 'bilibili.html', color: '#fb7299', keywords: ['b站', 'bilibili', '视频', '热门'] },
            { name: '帖子动态', desc: '浏览和发布帖子', icon: 'fas fa-newspaper', url: 'post.html', color: '#5bd6c9', keywords: ['帖子', '动态', '发布', '文章'] },
            { name: '设置', desc: '自定义网站主题和偏好', icon: 'fas fa-cog', url: 'settings.html', color: '#86a8e7', keywords: ['设置', '主题', '偏好', '配置'] },
            { name: '关于我们', desc: '了解更多关于这个网站', icon: 'fas fa-info-circle', url: 'about.html', color: '#feb47b', keywords: ['关于', '我们', '介绍'] }
        ];

        // ============ 工具函数 ============
        function getBeijingHour() { const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000; return new Date(u + 28800000).getHours(); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function initTheme() { const s = getCookie('theme'); applyTheme(s || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }

        // HTML 转义：防止帖子内容中的标签注入
        function esc(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ============ MD3 动态配色（继承首页种子色） ============
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255, g = parseInt(hex.slice(3, 5), 16) / 255, b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    default: h = (r - g) / d + 4;
                }
                h /= 6;
            }
            return [h * 360, s * 100, l * 100];
        }
        function hsl(h, s, l) { return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }
        function applySeed(seed) {
            const [h, s] = hexToHsl(seed);
            const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--seed', seed);
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h + 210) % 360, Math.min(s, 70), dark ? 78 : 68));
            root.setProperty('--md-tertiary', hsl((h + 60) % 360, Math.min(s, 80), dark ? 75 : 70));
            const aL = dark ? 16 : 95, bL = dark ? 14 : 93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s, 60), aL));
            root.setProperty('--bg-grad-2', hsl((h + 30) % 360, Math.min(s, 55), bL - 1));
            root.setProperty('--bg-grad-3', hsl((h + 200) % 360, Math.min(s, 55), aL - 2));
            root.setProperty('--bg-grad-4', hsl((h + 60) % 360, Math.min(s, 55), bL));
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark ? 60 : 55}%, ${dark ? 0.1 : 0.07})`);
        }

        initTheme();
        initI18n();
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);

        // ============ 加载帖子 ============
        async function loadPosts() {
            try {
                const res = await fetch(API_POSTS);
                if (res.ok) { const d = await res.json(); posts = d.posts || []; }
            } catch (e) {
                posts = JSON.parse(localStorage.getItem('borin_posts') || '[]');
            }
        }

        // ============ 搜索 ============
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('resultsContent');
            const countSpan = document.getElementById('resultCount');

            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results"><i class="fas fa-hand-point-up"></i><p>' + t('startSearch') + '</p></div>';
                countSpan.textContent = '';
                return;
            }

            let results = [];

            menuItems.forEach(item => {
                if (item.name.toLowerCase().includes(query) ||
                    item.desc.toLowerCase().includes(query) ||
                    item.keywords.some(k => k.includes(query))) {
                    results.push({ type: 'menu', item });
                }
            });

            posts.forEach(post => {
                const title = post.title || '', content = post.content || '', tags = post.tags || [];
                const titleMatch = title.toLowerCase().includes(query);
                const contentMatch = content.toLowerCase().includes(query);
                const tagMatch = tags.some(t => t.toLowerCase().includes(query) || query.includes(t.toLowerCase()));
                const hashMatch = query.startsWith('#') && tags.some(t => t.toLowerCase() === query.substring(1).toLowerCase());
                if (titleMatch || contentMatch || tagMatch || hashMatch) {
                    results.push({ type: 'post', item: post });
                }
            });

            countSpan.textContent = `(${results.length} ${t('resultCount')})`;

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>' + t('noResults') + '</p></div>';
                return;
            }

            let html = '';
            const menuResults = results.filter(r => r.type === 'menu');
            const postResults = results.filter(r => r.type === 'post');

            if (menuResults.length > 0) {
                html += '<div class="result-category"><h4><i class="fas fa-th-large"></i> ' + t('menuCategory') + '</h4>';
                menuResults.forEach(r => {
                    html += '<div class="result-item" onclick="location.href=\'' + esc(r.item.url) + '\'"><i class="' + esc(r.item.icon) + '" style="color:' + esc(r.item.color) + '"></i><div class="result-item-content"><h5>' + esc(r.item.name) + '</h5><p>' + esc(r.item.desc) + '</p></div></div>';
                });
                html += '</div>';
            }

            if (postResults.length > 0) {
                html += '<div class="result-category"><h4><i class="fas fa-newspaper"></i> ' + t('relatedPosts') + '</h4>';
                postResults.forEach(r => {
                    const tags = (r.item.tags || []).map(t => '<span class="result-tag">#' + esc(t) + '</span>').join(' ');
                    const content = r.item.content || '';
                    const snippet = content.length > 80 ? content.substring(0, 80) + '...' : content;
                    html += '<div class="result-item" onclick="location.href=\'p/' + esc(r.item.id) + '.html\'"><i class="fas fa-file-alt"></i><div class="result-item-content"><h5>' + esc(r.item.title) + tags + '</h5><p>' + esc(snippet) + '</p></div></div>';
                });
                html += '</div>';
            }

            resultsDiv.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        // ============ 时间显示 ============
        function updateTimeDisplay() {
            const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000, bj = new Date(u + 28800000);
            document.getElementById('beijing-time').textContent =
                String(bj.getHours()).padStart(2, '0') + ':' +
                String(bj.getMinutes()).padStart(2, '0') + ':' +
                String(bj.getSeconds()).padStart(2, '0');
        }
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 1000);

        // ============ 涟漪反馈 ============
        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect();
                const size = Math.max(r.width, r.height);
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        }
        document.querySelectorAll('.back-btn, .menu-btn, .search-btn').forEach(addRipple);

        // ============ 初始化 ============
        loadPosts();
    </script>
</body>
</html>
