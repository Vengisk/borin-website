<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4; --bg-grad-2: #ffe9ef; --bg-grad-3: #f3e9ff; --bg-grad-4: #e9f3ff;
            --md-primary: #fb7299; --md-on-primary: #ffffff; --md-secondary: #86a8e7; --md-tertiary: #feb47b;
            --text-primary: #2a1f24; --text-secondary: #6b5a60;
            --glass-fill: rgba(255,255,255,0.45); --glass-fill-strong: rgba(255,255,255,0.6);
            --glass-stroke: rgba(255,255,255,0.7); --glass-stroke-soft: rgba(255,255,255,0.35);
            --glass-shadow: rgba(180,120,140,0.18); --glass-highlight: rgba(255,255,255,0.9);
            --glass-tint: rgba(251,114,153,0.06); --blur: 18px;
            --shape-xs: 10px; --shape-sm: 16px; --shape-md: 22px; --shape-lg: 28px; --shape-xl: 36px; --shape-full: 999px;
            --spring: cubic-bezier(0.34,1.56,0.64,1); --spring-soft: cubic-bezier(0.2,0.9,0.3,1.2); --ease-standard: cubic-bezier(0.2,0,0,1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f; --bg-grad-2: #181430; --bg-grad-3: #0f1b3a; --bg-grad-4: #1a1430;
            --md-primary: #fb7299; --md-on-primary: #2a0e18; --md-secondary: #9db8ff; --md-tertiary: #ffc99b;
            --text-primary: #f2eef0; --text-secondary: #b7adc4;
            --glass-fill: rgba(40,44,70,0.4); --glass-fill-strong: rgba(50,54,84,0.55);
            --glass-stroke: rgba(160,175,230,0.4); --glass-stroke-soft: rgba(160,175,230,0.15);
            --glass-shadow: rgba(0,0,0,0.45); --glass-highlight: rgba(200,215,255,0.5);
            --glass-tint: rgba(120,140,220,0.08); --blur: 22px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand','Noto Sans SC','Segoe UI',Tahoma,sans-serif; }
        body { min-height: 100vh; position: relative; background: var(--bg-grad-1); color: var(--text-primary); overflow-x: hidden; display: flex; flex-direction: column; transition: color 0.4s var(--ease-standard); }
        body::before {
            content: ""; position: fixed; inset: -20%; z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%; animation: auroraFlow 22s ease-in-out infinite; filter: saturate(1.1); transition: background 0.6s ease;
        }
        @keyframes auroraFlow { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }
        body.sidebar-open { overflow: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; margin: 14px; border-radius: var(--shape-xl); background: var(--glass-fill-strong); backdrop-filter: blur(var(--blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--blur)) saturate(180%); border: 1px solid var(--glass-stroke-soft); box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight); position: sticky; top: 14px; z-index: 100; }
        .menu-btn, .search-btn { background: var(--glass-tint); border: 1px solid var(--glass-stroke-soft); color: var(--text-primary); font-size: 1.4rem; cursor: pointer; width: 48px; height: 48px; display: grid; place-items: center; border-radius: var(--shape-full); transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring); position: relative; overflow: hidden; z-index: 101; }
        .menu-btn:hover, .search-btn:hover { background: var(--md-primary); color: var(--md-on-primary); transform: scale(1.08); border-radius: var(--shape-md); }
        .menu-btn:active, .search-btn:active { transform: scale(0.92); }
        .title { font-size: 1.9rem; font-weight: 700; letter-spacing: 1px; background: linear-gradient(110deg, var(--md-primary), var(--md-tertiary), var(--md-secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        .sidebar { position: fixed; top: 14px; left: -380px; width: 340px; max-height: calc(100vh - 28px); border-radius: var(--shape-xl); background: var(--glass-fill-strong); backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%); border: 1px solid var(--glass-stroke-soft); box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight); z-index: 1000; transition: left 0.55s var(--spring-soft); display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .sidebar.open { left: 14px; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px 18px; border-bottom: 1px solid var(--glass-stroke-soft); }
        .close-btn { background: var(--glass-tint); border: 1px solid var(--glass-stroke-soft); color: var(--text-primary); font-size: 1.3rem; cursor: pointer; width: 42px; height: 42px; border-radius: var(--shape-full); transition: transform 0.5s var(--spring), background 0.3s ease; }
        .close-btn:hover { color: var(--md-on-primary); background: var(--md-primary); transform: rotate(90deg); }
        .sidebar-title { font-size: 1.6rem; font-weight: 700; background: linear-gradient(110deg, var(--md-secondary), var(--md-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 22px 0; }
        .menu-item { padding: 15px 18px; margin: 12px 0; border-radius: var(--shape-md); display: flex; align-items: center; cursor: pointer; font-size: 1.1rem; font-weight: 500; background: var(--glass-fill); border: 1px solid var(--glass-stroke-soft); transition: transform 0.5s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring); position: relative; overflow: hidden; }
        .menu-item:hover { background: var(--glass-tint); transform: translateX(8px); border-radius: var(--shape-lg) var(--shape-sm) var(--shape-lg) var(--shape-sm); border-color: var(--md-primary); }
        .menu-item:active { transform: translateX(8px) scale(0.97); }
        .menu-item i { margin-right: 14px; font-size: 1.35rem; width: 30px; text-align: center; }
        .bilibili-icon { color: var(--md-primary); }

        .overlay { position: fixed; inset: 0; background: rgba(20,15,25,0.35); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.4s var(--ease-standard); }
        .overlay.active { opacity: 1; visibility: visible; }

        main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .back-btn { display: inline-flex; align-items: center; align-self: flex-start; background: var(--glass-fill); backdrop-filter: blur(var(--blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--blur)) saturate(180%); color: var(--text-primary); font-weight: 600; padding: 11px 22px; border-radius: var(--shape-full); text-decoration: none; transition: transform 0.45s var(--spring), background 0.3s ease, border-radius 0.4s var(--spring); margin-bottom: 28px; border: 1px solid var(--glass-stroke-soft); box-shadow: inset 0 1px 0 var(--glass-highlight); }
        .back-btn:hover { background: var(--glass-tint); transform: translateX(-6px); border-radius: var(--shape-md); border-color: var(--md-primary); }
        .back-btn i { margin-right: 8px; }

        .about-container { max-width: 820px; width: 100%; background: var(--glass-fill); backdrop-filter: blur(var(--blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--blur)) saturate(180%); border-radius: var(--shape-xl); padding: 40px; border: 1px solid var(--glass-stroke-soft); box-shadow: 0 12px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight); text-align: center; animation: cardReveal 0.6s var(--spring-soft) both; }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
        .about-title { font-size: 2.3rem; font-weight: 700; margin-bottom: 30px; background: linear-gradient(110deg, var(--md-tertiary), var(--md-primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .creator-info { display: flex; flex-direction: column; align-items: center; margin: 30px 0; }
        .creator-icon { width: 120px; height: 120px; border-radius: var(--shape-full); background: linear-gradient(135deg, var(--md-primary), var(--md-tertiary)); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 3rem; color: var(--md-on-primary); box-shadow: 0 10px 30px var(--glass-shadow), inset 0 2px 4px rgba(255,255,255,0.4); transition: transform 0.5s var(--spring), border-radius 0.5s var(--spring); }
        .creator-icon:hover { transform: scale(1.05) rotate(-4deg); border-radius: var(--shape-xl); }
        .creator-name { font-size: 2rem; font-weight: 700; margin-bottom: 10px; color: var(--md-secondary); }
        .creator-title { font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 30px; font-weight: 500; }
        .about-content { text-align: left; font-size: 1.05rem; line-height: 1.8; margin-bottom: 30px; }
        .about-content p { margin-bottom: 14px; }
        .about-content strong { color: var(--md-primary); }
        .qq-group { background: var(--glass-tint); border: 1px solid var(--glass-stroke-soft); padding: 22px; border-radius: var(--shape-lg); margin: 30px 0; font-size: 1.2rem; }
        .qq-number { font-weight: 700; color: var(--md-primary); font-size: 1.5rem; margin-top: 10px; letter-spacing: 1px; }

        footer { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 22px; margin: 14px; border-radius: var(--shape-xl); background: var(--glass-fill); backdrop-filter: blur(var(--blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--blur)) saturate(180%); color: var(--text-secondary); border: 1px solid var(--glass-stroke-soft); box-shadow: inset 0 1px 0 var(--glass-highlight); }
        .copyright { font-size: 1rem; font-weight: 500; color: var(--text-secondary); }

        .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); transform: scale(0); animation: rippleEffect 0.6s var(--ease-standard); pointer-events: none; }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 768px) { .about-title { font-size: 2rem; } .about-container { padding: 30px; } .sidebar { width: calc(100vw - 28px); } }
        @media (max-width: 480px) { header { padding: 12px 16px; margin: 10px; } .title { font-size: 1.4rem; } .about-title { font-size: 1.7rem; } .about-container { padding: 22px; } .creator-icon { width: 100px; height: 100px; font-size: 2.5rem; } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } body::before { animation: none; } }
    </style>
    <script src="protect.js"></script>
</head>
<body class="page-transition">

    <header>

    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="backHome">返回首页</span></a>

    <footer>

    </footer>
    <script src="i18n.js"></script>
    <script>
        function getBeijingHour() { const now = new Date(); const utc = now.getTime() + now.getTimezoneOffset() * 60000; return new Date(utc + 28800000).getHours(); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function initTheme() { const s = getCookie('theme'); applyTheme(s || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }

        // MD3 动态配色（继承种子色）
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
            const max = Math.max(r,g,b), min = Math.min(r,g,b); let h, s, l = (max+min)/2;
            if (max === min) { h = s = 0; } else {
                const d = max-min; s = l > 0.5 ? d/(2-max-min) : d/(max+min);
                switch (max) { case r: h=(g-b)/d+(g<b?6:0); break; case g: h=(b-r)/d+2; break; default: h=(r-g)/d+4; } h/=6;
            }
            return [h*360, s*100, l*100];
        }
        function hsl(h,s,l){ return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`; }
        function applySeed(seed) {
            const [h,s] = hexToHsl(seed); const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h+210)%360, Math.min(s,70), dark?78:68));
            root.setProperty('--md-tertiary', hsl((h+60)%360, Math.min(s,80), dark?75:70));
            const aL = dark?16:95, bL = dark?14:93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s,60), aL));
            root.setProperty('--bg-grad-2', hsl((h+30)%360, Math.min(s,55), bL-1));
            root.setProperty('--bg-grad-3', hsl((h+200)%360, Math.min(s,55), aL-2));
            root.setProperty('--bg-grad-4', hsl((h+60)%360, Math.min(s,55), bL));
            root.setProperty('--glass-tint', `hsla(${h.toFixed(0)}, ${Math.min(s,80).toFixed(0)}%, ${dark?60:55}%, ${dark?0.1:0.07})`);
        }

        initTheme();
        initI18n();
        const savedSeed = getCookie('seed');
        if (savedSeed) applySeed(savedSeed);

        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');

        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebar.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 320); }

        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });

        function addRipple(el) {
            el.addEventListener('click', function (e) {
                const r = this.getBoundingClientRect(); const size = Math.max(r.width, r.height);
                const rp = document.createElement('span'); rp.className = 'ripple';
                rp.style.width = rp.style.height = size + 'px';
                rp.style.left = (e.clientX - r.left - size/2) + 'px';
                rp.style.top = (e.clientY - r.top - size/2) + 'px';
                this.appendChild(rp); setTimeout(() => rp.remove(), 600);
            });
        }
        document.querySelectorAll('.menu-item, .menu-btn, .search-btn').forEach(addRipple);
    </script>
</body>
