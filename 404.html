<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="animations.css">
    <style>
        :root {
            --seed: #fb7299;
            --bg-grad-1: #fff0f4; --bg-grad-2: #ffe9ef; --bg-grad-3: #f3e9ff; --bg-grad-4: #e9f3ff;
            --md-primary: #fb7299; --md-on-primary: #ffffff; --md-secondary: #86a8e7; --md-tertiary: #feb47b;
            --text-primary: #2a1f24; --text-secondary: #6b5a60;
            --glass-fill: rgba(255,255,255,0.45); --glass-fill-strong: rgba(255,255,255,0.6);
            --glass-stroke: rgba(255,255,255,0.7); --glass-stroke-soft: rgba(255,255,255,0.35);
            --glass-shadow: rgba(180,120,140,0.18); --glass-highlight: rgba(255,255,255,0.9);
            --glass-tint: rgba(251,114,153,0.06); --blur: 18px;
            --shape-md: 22px; --shape-lg: 28px; --shape-xl: 36px; --shape-full: 999px;
            --spring: cubic-bezier(0.34,1.56,0.64,1); --spring-soft: cubic-bezier(0.2,0.9,0.3,1.2); --ease-standard: cubic-bezier(0.2,0,0,1);
        }
        [data-theme="dark"] {
            --bg-grad-1: #14121f; --bg-grad-2: #181430; --bg-grad-3: #0f1b3a; --bg-grad-4: #1a1430;
            --md-primary: #fb7299; --md-on-primary: #2a0e18; --md-secondary: #9db8ff; --md-tertiary: #ffc99b;
            --text-primary: #f2eef0; --text-secondary: #b7adc4;
            --glass-fill: rgba(40,44,70,0.4); --glass-fill-strong: rgba(50,54,84,0.55);
            --glass-stroke: rgba(160,175,230,0.4); --glass-stroke-soft: rgba(160,175,230,0.15);
            --glass-shadow: rgba(0,0,0,0.45); --glass-highlight: rgba(200,215,255,0.5);
            --glass-tint: rgba(120,140,220,0.08); --blur: 22px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand','Noto Sans SC','Segoe UI',Tahoma,sans-serif; }
        body { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        body::before {
            content: ""; position: fixed; inset: -20%; z-index: -2;
            background:
                radial-gradient(circle at 20% 25%, var(--bg-grad-3), transparent 45%),
                radial-gradient(circle at 80% 20%, var(--bg-grad-4), transparent 45%),
                radial-gradient(circle at 70% 80%, var(--bg-grad-2), transparent 50%),
                radial-gradient(circle at 25% 75%, var(--bg-grad-1), transparent 50%),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 200% 200%; animation: auroraFlow 22s ease-in-out infinite; filter: saturate(1.1);
        }
        @keyframes auroraFlow { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }

        .container {
            text-align: center; padding: 48px 40px; max-width: 520px; width: calc(100% - 40px);
            background: var(--glass-fill); backdrop-filter: blur(var(--blur)) saturate(180%); -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--glass-stroke-soft); border-radius: var(--shape-xl);
            box-shadow: 0 20px 60px var(--glass-shadow), inset 0 1px 0 var(--glass-highlight);
            animation: cardReveal 0.7s var(--spring-soft) both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .error-code { font-size: 11rem; font-weight: 700; background: linear-gradient(135deg, var(--md-primary), var(--md-tertiary), var(--md-secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: floaty 3s var(--spring-soft) infinite; }
        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
        .error-title { font-size: 1.9rem; font-weight: 700; color: var(--text-primary); margin: 18px 0; }
        .error-message { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 32px; font-weight: 500; }
        .home-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px;
            background: var(--md-primary); color: var(--md-on-primary); text-decoration: none; border-radius: var(--shape-full);
            font-size: 1.05rem; font-weight: 700; position: relative; overflow: hidden;
            transition: transform 0.45s var(--spring), border-radius 0.4s var(--spring), box-shadow 0.3s ease;
            box-shadow: 0 8px 24px var(--glass-shadow);
        }
        .home-btn:hover { transform: translateY(-4px) scale(1.04); border-radius: var(--shape-md); box-shadow: 0 14px 36px var(--glass-shadow); }
        .home-btn:active { transform: translateY(-1px) scale(0.98); }

        .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.5); transform: scale(0); animation: rippleEffect 0.6s var(--ease-standard); pointer-events: none; }
        @keyframes rippleEffect { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 480px) { .container { padding: 36px 24px; } .error-code { font-size: 6.5rem; } .error-title { font-size: 1.5rem; } .error-message { font-size: 1rem; } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } body::before { animation: none; } }
    </style>
    <script src="protect.js"></script>
</head>
<body class="page-transition">
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title" data-i18n="error404Title">Not Found This Page</h1>
        <p class="error-message" data-i18n="error404Message">抱歉，您访问的页面不存在或已被删除</p>
        <a href="/" class="home-btn"><i class="fas fa-home"></i> <span data-i18n="backHome">返回首页</span></a>
    </div>
    <script src="i18n.js"></script>
    <script>
        function getBeijingHour() { const n = new Date(); return new Date(n.getTime() + n.getTimezoneOffset() * 60000 + 28800000).getHours(); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        document.documentElement.setAttribute('data-theme', getCookie('theme') || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark'));

        // 动态配色种子（与全站一致）
        function hexToHsl(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}return[h*360,s*100,l*100];}
        function hsl(h,s,l){return `hsl(${h.toFixed(0)}, ${s.toFixed(0)}%, ${l.toFixed(0)}%)`;}
        const seed = getCookie('seed');
        if (seed) {
            const [h,s] = hexToHsl(seed); const root = document.documentElement.style;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            root.setProperty('--md-primary', seed);
            root.setProperty('--md-secondary', hsl((h+210)%360, Math.min(s,70), dark?78:68));
            root.setProperty('--md-tertiary', hsl((h+60)%360, Math.min(s,80), dark?75:70));
            const aL = dark?16:95, bL = dark?14:93;
            root.setProperty('--bg-grad-1', hsl(h, Math.min(s,60), aL));
            root.setProperty('--bg-grad-2', hsl((h+30)%360, Math.min(s,55), bL-1));
            root.setProperty('--bg-grad-3', hsl((h+200)%360, Math.min(s,55), aL-2));
            root.setProperty('--bg-grad-4', hsl((h+60)%360, Math.min(s,55), bL));
        }

        const btn = document.querySelector('.home-btn');
        btn.addEventListener('click', function (e) {
            const r = this.getBoundingClientRect(); const size = Math.max(r.width, r.height);
            const rp = document.createElement('span'); rp.className = 'ripple';
            rp.style.width = rp.style.height = size + 'px';
            rp.style.left = (e.clientX - r.left - size/2) + 'px';
            rp.style.top = (e.clientY - r.top - size/2) + 'px';
            this.appendChild(rp); setTimeout(() => rp.remove(), 600);
        });

        initI18n();
    </script>
</body>
</html>
